<!DOCTYPE html>
<html>
<head>
    <title>Debales AI Assistant</title>
    <!-- <link rel="stylesheet" href="/static/style.css"> -->
</head>


<style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
}

.container {
    width: 700px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    color: #111827;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    color: #6b7280;
    margin-bottom: 25px;
}

textarea {
    width: 100%;
    height: 130px;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    resize: none;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.answer-box {
    margin-top: 25px;
    padding: 20px;
    background: #eef6ff;
    border-left: 5px solid #2563eb;
    border-radius: 10px;
}

.answer-box h2 {
    margin-top: 0;
}

.answer-box p {
    line-height: 1.6;
    white-space: pre-line;
}
</style>
<body>

    <div class="container">
        <h1>Debales AI Assistant</h1>
        <p class="subtitle">RAG + SERP API + LangGraph Chatbot</p>

        <form action="/generate" method="post">
            <textarea 
                name="question" 
                placeholder="Ask something about Debales AI..."
                required>{{ question or "" }}</textarea>

            <button type="submit">Ask Question</button>
        </form>
        {% if answer %}
        <div class="answer-box">
            <h2>Answer</h2>
            <p>{{ answer }}</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
